<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <title>회원 가입</title>
  </head>
  <body>
    <div class="container">
      <h2>👤 회원 가입</h2>
      <p>SKALA-FRONT 회원가입을 환영합니다.</p>
      <hr />
      <form action="signUpResult.html" method="get">
        <fieldset>
          <legend>계정 정보</legend>
          <p>
            <label for="username">사용자 이름:</label>
            <input type="text" id="username" name="username" required />
            <small>(필수)</small>
          </p>
          <p>
            <label for="userPw">비밀번호: </label>
            <input
              type="password"
              id="userPw"
              name="userPw"
              minlength="8"
              required
              placeholder="8자 이상 입력"
            />
            <small>(필수)</small>
          </p>
          <p>
            <label for="userEmail">이메일:</label>
            <input
              type="text"
              id="userEmail"
              name="userEmail"
              placeholder="example"
            />
            @
            <select name="emailDomain">
              <option value="direct">직접 입력</option>
              <option value="naver.com">naver.com</option>
              <option value="gmail.com">gmail.com</option>
              <option value="hotmail.com">hotmail.com</option>
            </select>
          </p>
        </fieldset>
        <br />
        <fieldset>
          <legend>개인 프로필 정보</legend>
          <p>
            <label for="userName">이름:</label>
            <input type="text" id="userName" name="userName" required />
          </p>
          <p>
            <label for="userBirth">생년월일:</label>
            <input type="date" id="userBirth" name="userBirth" required />
          </p>
          <p>
            성별:
            <label>
              <input type="radio" name="userGender" value="male" checked /> 남성
            </label>
            <label>
              <input type="radio" name="userGender" value="female" /> 여성
            </label>
            <label>
              <input type="radio" name="userGender" value="none" /> 선택 안함
            </label>
          </p>
          <p>
            관심 분야 (중복 선택 가능): <br /><br
            <label
              ><input type="checkbox" name="userInterest" value="frontend" /> 웹
              프론트엔드 (Vue.js, React 등)</label
            ><br />
            <label
              ><input type="checkbox" name="userInterest" value="backend" /> 웹
              백엔드 (Node.js, Java 등)</label
            ><br />
            <label
              ><input type="checkbox" name="userInterest" value="mobile" />
              모바일 개발 (React Native, Flutter 등)</label
            ><br />
            <label
              ><input type="checkbox" name="userInterest" value="ai" /> 인공지능
              (머신러닝, 딥러닝 등)</label
            ><br />
          </p>
          <p>
            <label for="userJoinPath">가입 경로:</label>
            <select id="userJoinPath" name="userJoinPath">
              <option value="" disabled selected>-- 선택하세요 --</option>
              <option value="search">인터넷 검색</option>
              <option value="sns">SNS</option>
              <option value="blog">블로그</option>
              <option value="friend">지인 추천</option>
            </select>
          </p>
        </fieldset>

        <br />

        <fieldset>
          <legend>자기 소개</legend>
          <p>
            <label for="userIntro">한줄 자기소개:</label><br />
            <textarea
              id="userIntro"
              name="userIntro"
              rows="5"
              cols="50"
              placeholder="자기소개를 입력하세요. (최대 200자)"
            ></textarea>
          </p>
        </fieldset>
        <br />
        <input type="submit" class="btn-submit" value="동의하고 회원가입" />
        <input type="reset" class="btn-reset" value="다시 작성" />
      </form>
    </div>
  </body>
</html>
