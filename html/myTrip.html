<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나의 여행 앨범</title>
  </head>
  <body>
    <div class="container">
      <h1>🌍 나의 여행 앨범 🎵</h1>
      <audio controls>
        <source src="../media/music2.mp3" type="audio/mpeg" />
        Your browser does not support the audio element.
      </audio>
      <hr />
      <div class="trip-grid-container">
        <p class="trip-card">
          <img
            src="../media/제주도.jpeg"
            width="400"
            height="200"
            alt="제주도 성산일출봉"
          /><br />제주도 성산일출봉 (2016년)
        </p>
        <p class="trip-card">
          <img
            src="../media/전주.jpeg"
            width="400"
            height="200"
            alt="전주 한옥마을"
          /><br />전주 한옥마을 (2024년)
        </p>
        <p class="trip-card">
          <img
            src="../media/순천.jpeg"
            width="400"
            height="200"
            alt="순천만 습지"
          /><br />순천만 습지 (2025년)
        </p>
      </div>
      <hr />
      <h2>📹 나의 여행 브이로그</h2>
      <p>
        <video width="400" height="225" controls>
          <source src="../media/video.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
        <br />리장의 아름다운 음악 ✈️
      </p>
    </div>
  </body>
</html>
